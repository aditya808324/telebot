<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Shringar Studio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{ --gold: #D4A017; --saffron: #FF6B00; --bg: #0F0500; --cream: #FFF8F0; }
        body{ background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--cream); margin:0; }
        .screen{ display:none; padding: 20px; padding-bottom: 100px; animation: fadeIn 0.3s; }
        .active{ display:block; }
        @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
        .card{ background: rgba(255,255,255,0.05); border: 1px solid rgba(212,160,23,0.2); border-radius:12px; padding:15px; margin-bottom:10px; cursor:pointer; }
        .selected{ border-color: var(--gold); background: rgba(212,160,23,0.1); }
        .grid{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        .slot-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; }
        .slot{ padding:10px; text-align:center; border:1px solid #333; border-radius:8px; font-size:12px; }
        .slot.booked{ opacity:0.2; pointer-events:none; }
        .slot.picked{ background: var(--gold); color: black; border-color: var(--gold); }
        .btn-primary{ position:fixed; bottom:20px; left:20px; right:20px; padding:15px; border:none; border-radius:12px; background:linear-gradient(135deg, var(--gold), var(--saffron)); color:black; font-weight:700; cursor:pointer; }
        .btn-primary:disabled{ opacity:0.3; }
        input{ width:100%; padding:12px; margin-bottom:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:8px; box-sizing:border-box; }
    </style>
</head>
<body>
    <div id="app">
        <div class="screen active" id="screen-svc">
            <h2 style="color:var(--gold)">Select Services</h2>
            <div class="grid" id="svc-list"></div>
            <button class="btn-primary" id="btn-svc" disabled onclick="goTo('screen-staff')">Choose Expert →</button>
        </div>

        <div class="screen" id="screen-staff">
            <h2 style="color:var(--gold)">Select Expert</h2>
            <div id="staff-list"></div>
            <button class="btn-primary" id="btn-staff" disabled onclick="goTo('screen-time')">Pick Date & Time →</button>
        </div>

        <div class="screen" id="screen-time">
            <h2 style="color:var(--gold)">Appointment Time</h2>
            <input type="date" id="date-picker" onchange="fetchSlots()">
            <div class="slot-grid" id="slot-list"></div>
            <button class="btn-primary" id="btn-time" disabled onclick="goTo('screen-details')">Your Details →</button>
        </div>

        <div class="screen" id="screen-details">
            <h2 style="color:var(--gold)">Final Step</h2>
            <input type="text" id="user-name" placeholder="Full Name" oninput="valDetails()">
            <input type="tel" id="user-phone" placeholder="Mobile Number" maxlength="10" oninput="valDetails()">
            <button class="btn-primary" id="btn-det" disabled onclick="submitBooking()">Confirm Booking</button>
        </div>

        <div class="screen" id="screen-done" style="text-align:center; padding-top:100px;">
            <h1 style="color:var(--gold)">Booked! ✨</h1>
            <p id="ref-id" style="font-size:1.5rem; letter-spacing:2px;"></p>
            <p>Confirmation sent to Telegram.</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        const BACKEND = 'pybackend-production-591b.up.railway.app'; 
        let booking = { svcs: [], staff: null, date: null, time: null };

        async function init() {
            const [s1, s2] = await Promise.all([fetch(`${BACKEND}/api/services`), fetch(`${BACKEND}/api/staff`)]);
            const services = await s1.json();
            const staff = await s2.json();

            document.getElementById('svc-list').innerHTML = services.map(s => `
                <div class="card" onclick="toggleSvc(this, '${s.name}', ${s.price})">
                    <b>${s.name}</b><br>₹${s.price}
                </div>`).join('');

            document.getElementById('staff-list').innerHTML = staff.map(s => `
                <div class="card" onclick="selectStaff(this, '${s.name}')">${s.name}</div>`).join('');
        }

        function goTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleSvc(el, name, price) {
            el.classList.toggle('selected');
            const idx = booking.svcs.findIndex(x => x.name === name);
            if(idx > -1) booking.svcs.splice(idx,1); else booking.svcs.push({name, price});
            document.getElementById('btn-svc').disabled = booking.svcs.length === 0;
        }

        function selectStaff(el, name) {
            document.querySelectorAll('#staff-list .card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            booking.staff = name;
            document.getElementById('btn-staff').disabled = false;
        }

        async function fetchSlots() {
            const d = document.getElementById('date-picker').value;
            booking.date = d;
            const res = await fetch(`${BACKEND}/api/slots?date=${d}`);
            const slots = await res.json();
            document.getElementById('slot-list').innerHTML = slots.map(s => `
                <div class="slot ${s.booked?'booked':''}" onclick="selectSlot(this, '${s.time}')">${s.time}</div>`).join('');
        }

        function selectSlot(el, time) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('picked'));
            el.classList.add('picked');
            booking.time = time;
            document.getElementById('btn-time').disabled = false;
        }

        function valDetails() {
            const n = document.getElementById('user-name').value;
            const p = document.getElementById('user-phone').value;
            document.getElementById('btn-det').disabled = !(n.length > 2 && p.length === 10);
        }

        async function submitBooking() {
            const btn = document.getElementById('btn-det');
            btn.disabled = true; btn.innerText = "Saving...";
            const res = await fetch(`${BACKEND}/api/book`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: tg?.initDataUnsafe?.user?.id || "0",
                    clientName: document.getElementById('user-name').value,
                    phone: document.getElementById('user-phone').value,
                    serviceNames: booking.svcs.map(s => s.name).join(', '),
                    date: booking.date,
                    slot: booking.time
                })
            });
            const out = await res.json();
            if(out.success) {
                document.getElementById('ref-id').innerText = out.booking_id;
                goTo('screen-done');
            }
        }
        init();
    </script>
</body>
</html>
